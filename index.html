<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YTMP3 Pro - Free YouTube to MP3 & MP4 Converter</title>
    <style>
        :root { --primary-color: #ff4757; --bg-color: #0f0f0f; --card-bg: #1f1f1f; --text-color: #ffffff; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh; }
        header { background-color: var(--card-bg); padding: 20px; text-align: center; border-bottom: 2px solid var(--primary-color); }
        header h1 { margin: 0; font-size: 28px; color: var(--primary-color); }
        .container { max-width: 800px; margin: 40px auto; padding: 20px; text-align: center; flex: 1; }
        .converter-box { background-color: var(--card-bg); padding: 40px 30px; border-radius: 12px; }
        p.subtitle { color: #aaa; font-size: 16px; margin-bottom: 30px; }
        input[type="text"] { width: 90%; padding: 15px; border: 2px solid #333; border-radius: 8px; background-color: #111; color: #fff; font-size: 16px; outline: none; margin-bottom: 20px; }
        .format-options { display: flex; justify-content: center; gap: 20px; margin-bottom: 25px; }
        .btn-convert { background-color: var(--primary-color); color: white; border: none; padding: 15px 40px; font-size: 18px; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; }
        .iframe-container { margin-top: 30px; display: none; width: 100%; height: 180px; border: none; border-radius: 8px; }
    </style>
</head>
<body>

    <header>
        <h1>YTMP3 Pro (Superfast V2)</h1>
    </header>

    <div class="container">
        <div class="converter-box">
            <h2>YouTube Video / Shorts URL टाका</h2>
            <p class="subtitle">काही सेकंदात हाय-क्वालिटी MP3 किंवा MP4 मध्ये कन्व्हर्ट करा</p>
            
            <input type="text" id="videoLink" placeholder="युट्यूब किंवा शॉर्ट्स लिंक इथे पेस्ट करा...">

            <div class="format-options">
                <label><input type="radio" name="format" value="mp3" checked> 🎵 MP3 (Audio)</label>
                <label><input type="radio" name="format" value="mp4"> 🎥 MP4 (Video)</label>
            </div>

            <button class="btn-convert" onclick="startConversion()">Convert & Download</button>

            <iframe id="downloadWidget" class="iframe-container" src=""></iframe>
        </div>
    </div>

    <script>
        function startConversion() {
            var url = document.getElementById('videoLink').value.trim();
            var format = document.querySelector('input[name="format"]:checked').value;
            var widget = document.getElementById('downloadWidget');

            if(url === "") {
                alert("सोनू भाऊ, लिंक रिकामी आहे! 😅");
                return;
            }

            var videoId = "";
            
            // सुधारित आणि व्हेरीफाईड लॉजिक
            if (url.includes("shorts/")) {
                var parts = url.split("shorts/");
                if(parts[1]) { videoId = parts[1].split(/[?#&]/)[0]; }
            } else if (url.includes("youtu.be/")) {
                var parts = url.split("youtu.be/");
                if(parts[1]) { videoId = parts[1].split(/[?#&]/)[0]; }
            } else if (url.includes("v=")) {
                var parts = url.split("v=");
                if(parts[1]) { videoId = parts[1].split(/[?#&]/)[0]; }
            } else if (url.includes("embed/")) {
                var parts = url.split("embed/");
                if(parts[1]) { videoId = parts[1].split(/[?#&]/)[0]; }
            }

            // फायनल चेकिंग
            if (videoId && videoId.length === 11) {
                var apiSrc = "";
                if(format === "mp3") {
                    apiSrc = "https://images.ytmp3.nu/widget/button/?id=" + videoId + "&f=mp3&bg=1f1f1f&txt=ffffff&btn=ff4757";
                } else {
                    apiSrc = "https://images.ytmp3.nu/widget/button/?id=" + videoId + "&f=mp4&bg=1f1f1f&txt=ffffff&btn=ff4757";
                }
                widget.src = apiSrc;
                widget.style.display = "block";
            } else {
                // या मेसेजवरून समजेल की सिस्टीम नवीन कोड वाचत आहे
                alert("नवीन सिस्टीम चालू आहे, पण तुमच्या लिंकमधील 'Video ID' चुकीचा वाटत आहे! आयडी: " + videoId);
            }
        }
    </script>
</body>
</html>
